<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Miracle Content Studio - AI-assisted content creation for businesses in Korea" />
    <title>Miracle Content Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restore path saved by 404.html for GitHub Pages SPA routing
      (function () {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          window.history.replaceState(null, '', redirect);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
